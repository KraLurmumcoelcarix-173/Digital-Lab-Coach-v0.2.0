<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Digital Lab Coach</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  </head>
  <body>
    <header>
      <h1>Digital Lab Coach</h1>
      <div class="upload">
        <label for="file-input" class="btn">Open .dig</label>
        <input id="file-input" type="file" accept=".dig" />
        <span id="filename" class="muted"></span>
      </div>
    </header>

    <main>
      <section id="graph-pane">
        <div id="cy"></div>
        <div id="placeholder" class="placeholder">
          Drop a <code>.dig</code> file above, or click <strong>Open .dig</strong>.
        </div>
      </section>

      <aside id="summary-pane">
        <h2>Circuit summary</h2>
        <div id="summary" class="muted">No file loaded.</div>

        <h2>Hover details</h2>
        <div id="hover-info" class="muted">Hover any node or edge.</div>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
